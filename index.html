<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Temporis Docs</title>
  <meta name="description" content="Temporis is a time-series forecasting API. Send your data, define a data profile, and generate probabilistic forecasts with a single request.">
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml">
  <link rel="canonical" href="https://docs.temporis.co/en/">
  <script>
    (function () {
      // Supported languages, kept in sync with assets/docs.js.
      var SUPPORTED = ['en', 'zh', 'es', 'fr', 'de', 'ja', 'ko', 'pt', 'ru', 'hi', 'ar'];
      var DEFAULT = 'en';

      function pick() {
        // 1. An explicit prior choice wins.
        try {
          var saved = localStorage.getItem('temporis-lang');
          if (saved && SUPPORTED.indexOf(saved) !== -1) return saved;
        } catch (e) {}
        // 2. Otherwise match the browser's preferred languages.
        var prefs = navigator.languages || [navigator.language || ''];
        for (var i = 0; i < prefs.length; i++) {
          var code = String(prefs[i]).toLowerCase().split('-')[0];
          if (SUPPORTED.indexOf(code) !== -1) return code;
        }
        return DEFAULT;
      }

      location.replace('/' + pick() + '/');
    })();
  </script>
  <noscript><meta http-equiv="refresh" content="0; url=/en/"></noscript>
</head>
<body>
  <p>Redirecting to the documentation… <a href="/en/">Continue in English</a>.</p>
</body>
</html>
